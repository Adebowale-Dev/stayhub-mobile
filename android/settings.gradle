plugins { id("com.facebook.react.settings") }

def resolveNodeExecutable() {
  def envNode = System.getenv("NODE_BINARY")
  if (envNode && new File(envNode).exists()) {
    return envNode
  }

  def candidateRoots = [
    System.getenv("ProgramFiles"),
    System.getenv("ProgramFiles(x86)"),
    System.getenv("LOCALAPPDATA")
  ].findAll { it }

  def nodeCandidate = candidateRoots
    .collectMany { root ->
      [
        new File(root, "nodejs/node.exe"),
        new File(root, "Programs/nodejs/node.exe")
      ]
    }
    .find { it.exists() }

  return nodeCandidate?.absolutePath ?: "node"
}

def nodeExecutable = resolveNodeExecutable()

def getRNMinorVersion() {
  def resolvedNodeExecutable = resolveNodeExecutable()
  def version = providers.exec {
    commandLine(resolvedNodeExecutable, "-e", "console.log(require('react-native/package.json').version);")
  }.standardOutput.asText.get().trim()

  def coreVersion = version.split("-")[0]
  def (major, minor, patch) = coreVersion.tokenize('.').collect { it.toInteger() }

  return minor
}

if (getRNMinorVersion() >= 75) {
  extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    def useExpoCoreAutolinking = System.getenv('EXPO_UNSTABLE_CORE_AUTOLINKING') != '0'
    if (useExpoCoreAutolinking) {
      println('\u001B[32mUsing expo-modules-autolinking as core autolinking source\u001B[0m')
      def command = [
        nodeExecutable,
        '--no-warnings',
        '--eval',
        'require(require.resolve(\'expo-modules-autolinking\', { paths: [require.resolve(\'expo/package.json\')] }))(process.argv.slice(1))',
        'react-native-config',
        '--json',
        '--platform',
        'android'
      ].toList()
      ex.autolinkLibrariesFromCommand(command)
    } else {
      ex.autolinkLibrariesFromCommand()
    }
  }
}

